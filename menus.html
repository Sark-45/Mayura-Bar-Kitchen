<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menus | MAYURA 1989 Bar & Kitchen</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .menus-hero {
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), url('https://images.unsplash.com/photo-1544148103-0773bf10d330?auto=format&fit=crop&w=1920&q=80') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .menus-content {
            z-index: 2;
            width: 100%;
            max-width: 1200px;
            padding: 0 2rem;
        }

        .menus-content h1 {
            font-size: clamp(3rem, 6vw, 5rem);
            margin-bottom: 1rem;
            color: var(--text-white);
        }

        .menus-content p {
            font-size: 1.2rem;
            color: var(--text-gray);
            margin-bottom: 4rem;
        }

        .menu-selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 3rem;
        }

        .menu-choice-card {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 4rem 2rem;
            text-decoration: none;
            color: var(--text-white);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            justify-content: center;
        }

        .menu-choice-card i {
            font-size: 4rem;
            color: var(--primary-gold);
            margin-bottom: 1.5rem;
            transition: var(--transition);
        }

        .menu-choice-card h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .menu-choice-card p {
            font-size: 1rem;
            margin-bottom: 0;
            color: var(--text-gray);
            transition: var(--transition);
        }

        .menu-choice-card:hover {
            transform: translateY(-10px);
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--primary-gold);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .menu-choice-card:hover i {
            transform: scale(1.1);
        }

        .menu-choice-card:hover p {
            color: var(--text-white);
        }
    </style>
</head>

<body>
    <section class="menus-hero">
        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
        <div class="menus-content">
            <h1 class="reveal">Our Menu</h1>
            <p class="reveal delay-1">Choose an experience to explore</p>

            <div class="menu-selection-grid">
                <a href="menu.html" class="menu-choice-card reveal delay-2">
                    <i class="fas fa-utensils"></i>
                    <h2>Food Menu</h2>
                    <p>Authentic Andhra Cuisine, Biryanis, & Tandoor Specials</p>
                </a>

                <a href="bar.html" class="menu-choice-card reveal delay-3">
                    <i class="fas fa-glass-martini-alt"></i>
                    <h2>Bar & Cocktails</h2>
                    <p>Premium Spirits, Signature Cocktails, & Craft Beers</p>
                </a>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
